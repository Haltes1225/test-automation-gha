name: CI

on:
    push:
        branches: 
            - main
      
jobs:
    format:
        name: Check format
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v5
        - uses: psf/black@22.3.0
          with:
            options: "--check --verbose"
            src: "./"
            version: "22.3.0"

    lint:
        name: Run linter
        needs: [format]
        runs-on: ubuntu-latest
        container:
            image: alpine/flake8:3.8.4
            options: --cpus="1"
        steps:
            - name: Check out Git repository
              uses: actions/checkout@v3
            - name: Run flake8
              run: flake8 ./ --append-config=./.flake8 --verbose

              
    static_analysis:
        name: Static Code Analysis (Mypy)
        needs: [format]
        runs-on: ubuntu-latest
        steps:
        - name: Check out Git repository
          uses: actions/checkout@v6

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.14.3'
            cache: 'pip' # Speeds up subsequent runs

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Run Mypy
          run: mypy


    test:
        name: Run Tests
        needs: [lint, static_analysis] # Only run tests if linting passes
        runs-on: ubuntu-latest
        steps:
            - name: Check out Git repository
              uses: actions/checkout@v5
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.14.3' # Match your local version
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Run pytest
              run: pytest 